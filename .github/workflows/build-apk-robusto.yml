# Versão ROBUSTA do workflow — instala explicitamente os componentes
# do Android SDK que costumam faltar (causa nº 1 de "exit code 1").
name: Build APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Gerar APK de Debug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Já instala o que o projeto precisa
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      - name: Aceitar licenças do Android SDK
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      # Instala o Gradle 8.9 (não precisa do gradlew/binário wrapper)
      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Versões (debug)
        run: |
          gradle -v
          sdkmanager --list_installed 2>/dev/null | head -20

      - name: Compilar APK de Debug
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publicar o APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: hand-tracker-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          
