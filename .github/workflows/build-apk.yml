# Coloque este arquivo em: .github/workflows/build-apk.yml
name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Permite rodar manualmente pela aba "Actions"
  workflow_dispatch:

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Configura o JDK (necessário pro Gradle/Android)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle   # acelera builds subsequentes

      # 3. Configura o Android SDK
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # 4. (Opcional) Dar permissão de execução ao gradlew
      - name: Permissão no Gradle wrapper
        run: chmod +x ./gradlew

      # 5. Compila o APK de DEBUG
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6. Faz upload do APK como artefato (você baixa pela aba Actions)
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
